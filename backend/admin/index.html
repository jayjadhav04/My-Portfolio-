<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Portfolio</title>
  <style>
    :root { --bg: #0a0a0f; --card: rgba(18,18,30,0.7); --border: rgba(255,255,255,0.08); --text: #e8e8f0; --accent: #6366f1; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); }
    .admin-layout { display:flex; min-height:100vh; }
    .sidebar {
      width:240px; background:rgba(15,15,26,0.95); padding:2rem 1rem; border-right:1px solid var(--border);
      display:flex; flex-direction:column; gap:0.5rem;
    }
    .sidebar a {
      color:var(--text); text-decoration:none; padding:0.75rem 1rem; border-radius:8px; font-weight:500;
      cursor:pointer; display:block; transition:.2s;
    }
    .sidebar a:hover, .sidebar a.active { background:rgba(99,102,241,0.2); color:#fff; }
    .main { flex:1; padding:2rem; overflow-y:auto; }
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:16px; padding:1.5rem;
      backdrop-filter:blur(20px); margin-bottom:1.5rem;
    }
    .btn {
      padding:0.5rem 1.2rem; border-radius:50px; background:var(--accent); color:#fff; border:none;
      font-weight:600; cursor:pointer; transition:opacity 0.2s; margin-right:0.5rem;
    }
    .btn:hover { opacity:0.85; }
    .btn-danger { background:#e74c3c; }
    input, textarea { 
      width:100%; padding:0.7rem; background:rgba(0,0,0,0.3); border:1px solid var(--border);
      border-radius:8px; color:#fff; margin-bottom:1rem; font-family:inherit;
    }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:0.7rem; border-bottom:1px solid var(--border); }
    .hidden { display:none; }
    .toast {
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:#2ecc71; color:#fff;
      padding:0.8rem 2rem; border-radius:50px; font-weight:600; z-index:9999;
    }
    @media(max-width:768px){ .sidebar { width:100%; position:fixed; bottom:0; flex-direction:row; z-index:100; } }
  </style>
</head>
<body>
<div class="admin-layout">
  <div class="sidebar">
    <h2 style="font-family:'Space Grotesk';color:var(--accent);">Admin</h2>
    <a href="#" class="active" data-section="dashboard">📊 Dashboard</a>
    <a href="#" data-section="projects">📁 Projects</a>
    <a href="#" data-section="skills">⚡ Skills</a>
    <a href="#" data-section="certs">🎓 Certifications</a>
    <a href="#" data-section="messages">✉️ Messages</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
  </div>
  <div class="main" id="mainContent"></div>
</div>
<div id="toast" class="toast hidden"></div>

<script>
const API_BASE = '';
let token = localStorage.getItem('admin_token');
if (!token) { window.location.href = '/admin/login.html'; }

const sections = {
  dashboard: renderDashboard,
  projects: renderProjects,
  skills: renderSkills,
  certs: renderCerts,
  messages: renderMessages
};

document.querySelectorAll('.sidebar a[data-section]').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    link.classList.add('active');
    const section = link.dataset.section;
    sections[section]();
  });
});

sections.dashboard();

async function fetchAPI(url, options = {}) {
  const res = await fetch(API_BASE + url, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...options.headers
    }
  });
  if (res.status === 401) { localStorage.removeItem('admin_token'); window.location.href='/admin/login.html'; }
  return res.json();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2000);
}

function logout() {
  localStorage.removeItem('admin_token');
  window.location.href = '/admin/login.html';
}

function renderDashboard() {
  document.getElementById('mainContent').innerHTML = `
    <h2>Dashboard</h2>
    <div class="card"><p>Welcome, Admin! Select a section from the sidebar.</p></div>
  `;
}

async function renderProjects() {
  const projects = await fetchAPI('/api/projects');
  let html = '<h2>Projects</h2><button class="btn" onclick="addProject()">+ New Project</button><div class="card"><table>';
  projects.forEach(p => {
    html += `<tr><td>${p.title}</td><td><button class="btn" onclick="editProject('${p._id}')">Edit</button> <button class="btn btn-danger" onclick="deleteProject('${p._id}')">Delete</button></td></tr>`;
  });
  html += '</table></div>';
  document.getElementById('mainContent').innerHTML = html;
}

function addProject() { alert('Add project form (you can expand this)'); }
function editProject(id) { alert('Edit project: ' + id); }
async function deleteProject(id) {
  if (confirm('Delete this project?')) {
    await fetchAPI(`/api/admin/projects/${id}`, { method: 'DELETE' });
    renderProjects();
    showToast('Project deleted');
  }
}

async function renderSkills() {
  const skills = await fetchAPI('/api/skills');
  let html = '<h2>Skills</h2><button class="btn" onclick="addSkill()">+ Add Skill</button><div class="card"><table>';
  skills.forEach(s => {
    html += `<tr><td>${s.icon} ${s.name}</td><td>${s.category}</td><td><button class="btn btn-danger" onclick="deleteSkill('${s._id}')">Delete</button></td></tr>`;
  });
  html += '</table></div>';
  document.getElementById('mainContent').innerHTML = html;
}
async function deleteSkill(id) {
  if (confirm('Delete skill?')) {
    await fetchAPI(`/api/admin/skills/${id}`, { method: 'DELETE' });
    renderSkills();
  }
}
function addSkill() { alert('Add skill form (expandable)'); }

async function renderCerts() {
  const certs = await fetchAPI('/api/certifications');
  let html = '<h2>Certifications</h2><button class="btn" onclick="addCert()">+ Add Certification</button><div class="card"><table>';
  certs.forEach(c => {
    html += `<tr><td>${c.icon} ${c.name}</td><td>${c.issuer}</td><td><button class="btn btn-danger" onclick="deleteCert('${c._id}')">Delete</button></td></tr>`;
  });
  html += '</table></div>';
  document.getElementById('mainContent').innerHTML = html;
}
async function deleteCert(id) {
  if (confirm('Delete cert?')) {
    await fetchAPI(`/api/admin/certifications/${id}`, { method: 'DELETE' });
    renderCerts();
  }
}
function addCert() { alert('Add cert form (expandable)'); }

async function renderMessages() {
  const msgs = await fetchAPI('/api/admin/messages');
  let html = '<h2>Contact Messages</h2><div class="card"><table>';
  msgs.forEach(m => {
    html += `<tr><td>${m.name}</td><td>${m.email}</td><td>${m.message}</td></tr>`;
  });
  html += '</table></div>';
  document.getElementById('mainContent').innerHTML = html;
}
</script>
</body>
</html>
